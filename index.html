<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	
	<title>StationGuessr</title>
	<link rel="icon" type="image/x-icon" href="./images/favicon.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

	
	<style>
		* {
			padding: 0;
			margin: 0;
			box-sizing: border-box;
		}

		html {
			font-family: Helvetica;
		}

		:root {
			--base-color: #a4d4bc;
			--base-variant: #e8e9ed;
			--text-color: #111528;
			--secondary-text: #008741;
			--primary-color: #3a435d;
			--accent-color: #0071ff;
		}

		.darkmode {
			--base-color: #070b1d;
			--base-variant: #101425;
			--text-color: #ffffff;
			--secondary-text: #a4a5b8;
			--primary-color: #3a435d;
			--accent-color: #0071ff;
		}

		#themeswitch { 
			height: 50px;
			width: 50px; padding: 0;
			border-radius: 50%;
			background-color: var(--base-variant); 
			display: flex;
			justify-content: center;
			align-items: center;
			position: fixed;
			top: 10px;
			right: 10px;
		}

		#themeswitch svg {
			fill: var(--primary-color);
		}

		#themeswitch svg:last-child {
			display: none;
		}

		.darkmode #themeswitch svg:first-child {
			display: none;
		}

		.darkmode #themeswitch svg:last-child {
			display: block;
		}

		body {
			background-color: var(--base-color);
			color: var(--text-color);
			height: 100%;
			margin: 0;
		}

		.leaflet-container {
			height: 100vh;
			width: 100vw;
			max-width: 100%;
			max-height: 100%;
		}

		.topnav a {
			background-color: #008741;
			float: center;
			display: block;
			color: #ffffff;
			padding: 20px;
			text-align: center;
			text-decoration: none;
			font-size: 27px;
			font-weight: bold;
			letter-spacing: 1.5px;
		}

		#map {
			box-sizing: border-box;
			display: flex;
			justify-content: center;
            align-items: center;
		}

		#guessing {
			box-sizing: border-box;
			display: flex;
			justify-content: center;
            align-items: center;
			height: 30vh;
			background-color: var(--base-variant);
			padding-bottom: 20px;
			padding-top: 55px;		
		}

		.container {
			display: flex;
			flex-direction: column;
			height: 100vh;
		}

		.box {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			border-radius: 16px;
			border: 15px solid var(--base-color);
			padding: 20px;
			padding-top: 40px;
		}

		@media (max-width: 767px) {
			.allstations {
				max-height: 35vh;
				width: 100vw;
				overflow-x: clip;
				overflow-y: scroll;
			}
		}

		@media (min-width: 768px) {
            .container {
                flex-direction: row;
                align-items: center;
            }
			
			#map {
				height: 100vh;
				width: 50vw;
			}

			#guessing {
				height: 100vh;
				width: 50vw;
			}

			.allstations {
				height: 25vh;
				width: 100vw;
				overflow-x: clip;
				overflow-y: scroll;			
			}

			.wrapped {
				height: 95vh;
			}
        }

		.station {
			border-radius: 7px;
			border: 2px solid var(--secondary-text);
			background-color:var(--base-variant);
			border-style: solid;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-right: 10px;
			margin-block: 10px;
			padding: 5px;
		}

		.station:hover {
			background-color:hsl(0deg 0% 0% / 0.25);
			transition-delay: 0.01s;
		}

		.station.correct {
			background-color: #008741;
		}

		.station.wrong {
			background-color: rgb(221, 82, 82);
		}

		.search {
			border-radius: 7px;
			border: 2px solid var(--secondary-text);
			background-color: var(--base-variant);
			color: var(--text-color);
			border-style: solid;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-right: 10px;
			padding: 15px;
			font-size: 15px;
		}

		.wrapped {
			width: 100%;
		}

		.allstations {
			width: 100%;
			overflow-x: clip;
			overflow-y: scroll;
			height: 80vh;
		}

		.square {
			height: 30px;
			width: 30px;
			border-radius: 5px;
			justify-content: center; 
			align-items: center;
			display: flex;
			font-weight: bold;
			font-family: Helvetica;
			margin-right: 10px;
			color: (--base-color);
		}

		.name {
			height: 100%;
		}

		#themeswitch svg {
			fill: var(--primary-color);
		}


		button {
			background-color: var(--text-color);
			border: 0;
			box-shadow: 1px 4px rgba(0, 0, 0, 0.3);
			color: #fff;
			cursor: pointer;
			padding: 10px 25px;
		}

		.modal {
			background-color: rgba(0, 0, 0, 0.3);
			opacity: 0;
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			transition: all 0.3s ease-in-out;
			z-index: -1;
			display: flex;
			align-items: center; justify-content: center;
		}

		.modal-inner { 
			background-color: #fff;
			border-radius: 5px;
			box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
			padding: 15px 25px;
			text-align: center;
			width: 380px;
		}

		.modal-inner h2 {
			margin: 0;
		}

		.modal-inner p {
			line-height: 24px; 
			margin: 10px 0;
		}

		.modal.open {
			opacity: 1;
			z-index: 999;
		}

		#closeModal {

		}







	</style>
	<script type="text/javascript" src="darkmode.js" defer></script>
</head>

<body class="darkmode">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script>
		const { createClient } = supabase
  		const _supabase = createClient('https://xhtkarqvsqbdzsbpjaox.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhodGthcnF2c3FiZHpzYnBqYW94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA2MjMwNjcsImV4cCI6MjA2NjE5OTA2N30.TVXWNlDRTcV_AAlL1QweZtnsOQtoHpZ62eaxbEG508U');
		function filter() {
						let input = document.getElementById('searchbar').value.toString().toLowerCase();
						let stations = document.querySelectorAll('div.station');

						stations.forEach((el) => {
							let text = el.querySelector('.name').textContent.toLowerCase();
							lowerstation = text.toLowerCase();
							el.style.display = text.includes(input) ? "flex" : "none";
						})
					}
			
		function results(guessnum, win) {
			var squares = ""
			const green_square = "🟩"
			const red_square = "🟥"
			const black_square = "⬛"

			var message = ""
			if (win) {
				if (win && guessnum === 1) {
					squares = "🟩"
					message = "🐐 Congrats, it took you "+guessnum.toString()+" try!"
				} else {
					const wrong = guessnum - 1
					const left = 5 - guessnum
					squares = red_square.repeat(wrong)+green_square+black_square.repeat(left)
					message = "🎊 Congrats, it took you "+guessnum.toString()+" tries!"
				} 
			} else {
				squares = red_square.repeat(5)
				message = "💔 Better luck next time!"
			}

			modal.classList.add("open")

			const modal_inside = document.getElementById("modal-inside")

			const desc = document.createElement('h2');
			// desc.className = ""
			desc.innerHTML = message
			

			const square_display = document.createElement('p')
			// square_display.className = ""
			square_display.innerHTML = squares

			modal_inside.appendChild(desc)
			modal_inside.appendChild(square_display)
				


			console.log(squares)
			console.log(message)


			}
		(async () => {
			const js_date = new Date()
			
			const year = js_date.getFullYear()
			const year_string = year.toString()

			const month = js_date.getMonth() + 1
			let month_string = month.toString()
			if (month < 10) {
				month_string = '0' + month_string
			}
				
			const day = js_date.getDate()
			const day_string = day.toString()
			if (day < 10) {
				day_string = '0' + day_string
			}

			const date = year_string + '-' + month_string + '-' + day_string

			const {data:num, err_num} = await _supabase
			.from('answers')
			.select('station_id').eq('date', date)

			const station_id = num[0].station_id
			
			const {data:ans, err_ans} = await _supabase
			.from('gostations')
			.select('stat_name, point_x, point_y')
			.eq('id', station_id)
			console.log(ans)

			const xcoord = ans[0].point_x
			const ycoord = ans[0].point_y

			var marker = L.marker([ycoord, xcoord], {icon: ANS}).addTo(map).bindPopup("What station is this?");

			const {count, error} = await _supabase
			.from('gostations')
			.select('*', { count: 'exact', head: true })

			const {data: stations, err_stations} = await _supabase
			.from('gostations')
			.select('colour, line_abbr, stat_name')
			.order('id')

			const generate_stations = document.getElementById('generatestations')

			for (let i = 0; i < count; i++) {
				const div = document.createElement('div');
				div.className = "station";	

				const span = document.createElement('span');
				span.className = "square";
				span.innerHTML = `${stations[i].line_abbr}`;
				span.style.backgroundColor = `${stations[i].colour}`;
				div.appendChild(span)

				const name = document.createElement('div');
				name.innerHTML = `${stations[i].stat_name}`
				name.className = "name"
				div.appendChild(name)
				generate_stations.appendChild(div)
			}

			

			var tries_count = 0

			const timeout = 150

			const buttons = document.querySelectorAll(".station");
			buttons.forEach(async button => {
				button.addEventListener('click', async () => {
					var answer = ans[0].stat_name
					const guess = button.childNodes[1].innerHTML
					if (guess === answer) {
						button.classList.add("correct");
						setTimeout(() => {
							button.classList.remove("correct");
						}, timeout);
					} else {
						button.classList.add("wrong");
						setTimeout(() => {
							button.classList.remove("wrong");
						}, timeout);
					}
					tries_count += 1
					if (guess === answer || tries_count === 5) {
						if (guess != answer) {
							tries_count = 0
							console.log("you lost")
						} else {
							console.log("you won")
						}
						
						// write tries_count to the database
						const {error} = await _supabase
						.from('stats')
						.insert({ith_guess: tries_count})

						results(tries_count, Math.ceil(tries_count/5))



						// hide the box of the list of stations
						// make box with results visible
						// display how many people got each station right
						// add coloured pins of all stations to the map and show the name
						// popup here with copyable results

					} 

					})
			})

			const openBtn = document.getElementById("openModal")
			const closeBtn = document.getElementById("closeModal")
			const modal = document.getElementById("modal")
			
			closeBtn.addEventListener("click", () => { modal.classList.remove("open");
			});
        })()
	</script>

<script>
	const map = L.map('map').setView([43.837208, -79.508278], 9);    
	var dark_tile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {

	})

	var light_tile = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {

	maxZoom: 20
	})

	dark_tile.addTo(map)

	var StationIcon = L.Icon.extend({
				options: {

	var UN = new StationIcon({iconUrl: './images/un.png'}),

		MI = new StationIcon({iconUrl: './images/mi.png'}),
		RH = new StationIcon({iconUrl: './images/rh.png'}),
		ST = new StationIcon({iconUrl: './images/st.png'}),
		ANS = new StationIcon({iconUrl: './images/ans.png'})
</script>
