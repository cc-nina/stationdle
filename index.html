<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	
	<title>Stationdle</title>
	<link rel="icon" type="image/x-icon" href="./images/favico.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

	<style>
		* {
			padding: 0;
			margin: 0;
			box-sizing: border-box;
		}

		html {
			font-family: Helvetica;
		}

		:root {
			--base-color: #a4d4bc;
			--base-variant: #e8e9ed;
			--text-color: #111528;
			--secondary-text: #008741;
			--primary-color: #3a435d;
			--accent-color: #0071ff;
		}

		.darkmode {
			--base-color: #070b1d;
			--base-variant: #101425;
			--text-color: #ffffff;
			--secondary-text: #a4a5b8;
			--primary-color: #3a435d;
			--accent-color: #0071ff;
		}

		#themeswitch { 
			height: 50px;
			width: 50px; padding: 0;
			border-radius: 50%;
			background-color: var(--base-variant); 
			display: flex;
			justify-content: center;
			align-items: center;
			position: fixed;
			top: 10px;
			right: 10px;
		}

		#themeswitch svg {
			fill: var(--primary-color);
		}

		#themeswitch svg:last-child {
			display: none;
		}

		.darkmode #themeswitch svg:first-child {
			display: none;
		}

		.darkmode #themeswitch svg:last-child {
			display: block;
		}

		body {
			background-color: var(--base-color);
			color: var(--text-color);
			height: 100%;
			margin: 0;
		}

		.leaflet-container {
			height: 100vh;
			width: 100vw;
			max-width: 100%;
			max-height: 100%;
		}

		.topnav a {
			background-color: #008741;
			float: center;
			display: block;
			color: #ffffff;
			padding: 20px;
			text-align: center;
			text-decoration: none;
			font-size: 27px;
			font-weight: bold;
			letter-spacing: 1.5px;
		}

		#map {
			box-sizing: border-box;
			display: flex;
			justify-content: center;
            align-items: center;
		}

		#guessing {
			box-sizing: border-box;
			display: flex;
			justify-content: center;
            align-items: center;
			height: 30vh;
			background-color: var(--base-variant);
			padding-bottom: 20px;
			padding-top: 55px;		
		}

		.container {
			display: flex;
			flex-direction: column;
			height: 100vh;
		}

		.box {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			border-radius: 16px;
			border: 15px solid var(--base-color);
			padding: 20px;
			padding-top: 40px;
		}

		@media (max-width: 767px) {
			.allstations {
				max-height: 35vh;
				width: 100vw;
				overflow-x: clip;
				overflow-y: scroll;
			}
		}

		@media (min-width: 768px) {
            .container {
                flex-direction: row;
                align-items: center;
            }
			
			#map {
				height: 100vh;
				width: 50vw;
			}

			#guessing {
				height: 100vh;
				width: 50vw;
			}

			.allstations {
				height: 25vh;
				width: 100vw;
				overflow-x: clip;
				overflow-y: scroll;			
			}

			.wrapped {
				height: 95vh;
			}
        }

		.station {
			border-radius: 7px;
			border: 2px solid var(--secondary-text);
			background-color:var(--base-variant);
			border-style: solid;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-right: 10px;
			margin-block: 10px;
			padding: 5px;
		}

		.station:hover {
			background-color:hsl(0deg 0% 0% / 0.25);
			transition-delay: 0.01s;
		}

		.station.correct {
			background-color: #008741;
		}

		.station.wrong {
			background-color: #dd5252;
		}

		.station.rightline {
			background-color: #f0ff6a;
		}

		.search {
			border-radius: 7px;
			border: 2px solid var(--secondary-text);
			background-color: var(--base-variant);
			color: var(--text-color);
			border-style: solid;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-right: 10px;
			padding: 15px;
			font-size: 15px;
		}

		.wrapped {
			width: 100%;
		}

		.allstations {
			width: 100%;
			overflow-x: clip;
			overflow-y: scroll;
			height: 80vh;
		}

		.square {
			height: 30px;
			width: 30px;
			border-radius: 5px;
			justify-content: center; 
			align-items: center;
			display: flex;
			font-weight: bold;
			font-family: Helvetica;
			margin-right: 10px;
			color: (--base-color);
		}

		.name {
			height: 100%;
		}

		#themeswitch svg {
			fill: var(--primary-color);
		}

		button {
			box-shadow: 1px 4px rgba(0, 0, 0, 0.3);
		}

		.modal {
			background-color: rgba(0, 0, 0, 0.3);
			opacity: 0;
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			transition: all 0.3s ease-in-out;
			z-index: -1;
			display: flex;
			align-items: center; justify-content: center;
		}

		.modal-inner { 
			background-color: var(--base-variant);
			border-radius: 5px;
			box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
			padding: 15px 25px;
			position: relative;
			text-align: center;
			width: 50vw;
			max-width: 450px;
		}

		.modal-inner h2 {
			margin: 0;
			position: relative;
			padding: 10px 25px;
		}

		.modal-inner p {
			line-height: 24px; 
			margin: 10px 0;
			position: relative;
		}

		.modal.open {
			opacity: 1;
			z-index: 999;
		}

		#closeModal {
			height: 50px;
			width: 50px; padding: 0;
			border-radius: 50%;
			background-color: var(--base-variant); 
			display: flex;
			justify-content: center;
			align-items: center;
			
		}

		#closeModal svg {
			fill: rgb(238, 162, 162)
		}

		.disable {
			pointer-events: none;
  			cursor: not-allowed;
			background-color:hsl(0deg 0% 0% / 0.25);
			transition-delay: 0.01s;
		}

		#copy_results {
			height: 50px;
			width: 50px; padding: 0;
			border-radius: 50%;
			background-color: var(--base-variant); 
			display: flex;
			justify-content: center;
			align-items: center;
			
		}

		#copy_results svg {
			fill: rgb(238, 162, 162)
		}

		.xrow {
			display: flex;
			justify-content: flex-end;
			padding: 10px 0px;
		}

		.copyRow {
			display: flex;
			justify-content: center;
			padding: 10px 5px;
		}

		#copytext {
			display: none;
		}

		#notif {
			padding: 10px 5px;
		}
	</style>
	<script type="text/javascript" src="darkmode.js" defer></script>
</head>

<body class="darkmode">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script>
		const { createClient } = supabase
  		const _supabase = createClient('https://xhtkarqvsqbdzsbpjaox.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhodGthcnF2c3FiZHpzYnBqYW94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA2MjMwNjcsImV4cCI6MjA2NjE5OTA2N30.TVXWNlDRTcV_AAlL1QweZtnsOQtoHpZ62eaxbEG508U');
		
		const js_date = new Date()
			
		const year = js_date.getFullYear()
		const year_string = year.toString()

		const month = js_date.getMonth() + 1
		let month_string = month.toString()
		if (month < 10) {
			month_string = '0' + month_string
		}
			
		const day = js_date.getDate()
		const day_string = day.toString()
		if (day < 10) {
			day_string = '0' + day_string
		}

		const date = year_string + '-' + month_string + '-' + day_string

		function filter() {
			let input = document.getElementById('searchbar').value.toString().toLowerCase();
			let stations = document.querySelectorAll('div.station');

			stations.forEach((el) => {
				let text = el.querySelector('.name').textContent.toLowerCase();
				lowerstation = text.toLowerCase();
				el.style.display = text.includes(input) ? "flex" : "none";
			})
		}
		
		function results(guessnum, win, squares) {
			var empty = guessnum
			while (empty < 5) {
				empty++
				squares += "⬛"
			}

			var shareresults = "Stationdle "+month_string+"/"+day_string+"/"+year_string+"\n\n"+squares+"\n\nhttps://stationdle.vercel.app/"

			if (win) {
				if (win && guessnum === 1) {
					message = "🐐 Congrats, it took you "+guessnum.toString()+" try!"
				} else {
					message = "🎊 Congrats, it took you "+guessnum.toString()+" tries!"
				} 
			} else {
				message = "💔 Better luck next time!"
			}

			modal.classList.add("open")

			const modal_inside = document.getElementById("modal-inside")
			const copy_row = document.getElementById("copy_row")

			const desc = document.createElement('h2');
			desc.innerHTML = message
			
			const square_display = document.createElement('p')
			square_display.innerHTML = squares

			const tobecopied = document.getElementById('copytext');
			tobecopied.innerHTML = shareresults
			modal_inside.insertBefore(desc, copy_row)
			modal_inside.insertBefore(tobecopied, copy_row)
			modal_inside.insertBefore(square_display, copy_row)
			}
		(async () => {
			const {data:num, err_num} = await _supabase
			.from('answers')
			.select('station_id').eq('date', date)

			const station_id = num[0].station_id
			
			const {data:ans, err_ans} = await _supabase
			.from('gostations')
			.select('stat_name, line_abbr, point_x, point_y')
			.eq('id', station_id)

			const xcoord = ans[0].point_x
			const ycoord = ans[0].point_y

			var marker = L.marker([ycoord, xcoord], {icon: ANS}).addTo(map).bindPopup("What station is this?");

			const {count, error} = await _supabase
			.from('gostations')
			.select('*', { count: 'exact', head: true })

			const {data: stations, err_stations} = await _supabase
			.from('gostations')
			.select('colour, line_abbr, stat_name')
			.order('id')

			const {data: rightline, err_rightline} = await _supabase
			.from('gostations')
			.select('stat_name')
			.eq('line_abbr', ans[0].line_abbr)

			const {count:linecount, err_linecount} = await _supabase
			.from('gostations')
			.select('*', { count: 'exact', head: true })
			.eq('line_abbr', ans[0].line_abbr)

			const sameline = []
			for (let i = 0; i < linecount; ++i) {
				sameline.push(rightline[i].stat_name)
			}

			const generate_stations = document.getElementById('generatestations')

			for (let i = 0; i < count; i++) {
				const div = document.createElement('div');
				div.className = "station";	

				const span = document.createElement('span');
				span.className = "square";
				span.innerHTML = `${stations[i].line_abbr}`;
				span.style.backgroundColor = `${stations[i].colour}`;
				div.appendChild(span)

				const name = document.createElement('div');
				name.innerHTML = `${stations[i].stat_name}`
				name.className = "name"
				div.appendChild(name)
				generate_stations.appendChild(div)
			}

			var wrong = 0
			var maybe = 0

			var tries_count = 0

			const timeout = 150
			var squares = ""

			const buttons = document.querySelectorAll(".station");
			buttons.forEach(async button => {
				button.addEventListener('click', async () => {
					var answer = ans[0].stat_name
					const guess = button.childNodes[1].innerHTML

					if (guess === answer) {
						button.classList.add("correct");
						squares += "🟩"
					} else if (sameline.includes(guess)) {
						button.classList.add("rightline");
						button.classList.add("disable");
						
						squares += "🟨"
					} else {
						button.classList.add("wrong");
						button.classList.add("disable");
						squares += "🟥"
					}
					tries_count += 1
					if (guess === answer || tries_count === 5) {
						for (let i = 0; i < count; i++) {
							generate_stations.childNodes[i].classList.add("disable")
						}
						
						if (guess != answer) {
							tries_count++
						}
						// write tries_count to the database
						const {error} = await _supabase
						.from('stats')
						.insert({ith_guess: tries_count})

						results(tries_count, guess === answer, squares)
					} 
					})
			})

			const openBtn = document.getElementById("openModal")
			const closeBtn = document.getElementById("closeModal")
			const copyBtn = document.getElementById("copy_results")
			const modal = document.getElementById("modal")
			
			closeBtn.addEventListener("click", () => { modal.classList.remove("open");
			});

			copyBtn.addEventListener("click", () => {
				let text = document.getElementById('copytext');
				const notif = document.getElementById('notif')
				navigator.clipboard
				.writeText(text.innerHTML)
				.then(() => {
					notif.innerHTML = "Copied!"
				})
				.catch(() => {
					notif.innerHTML = "Failed to copy!"
				});
			});
        })()
	</script>
