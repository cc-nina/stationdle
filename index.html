<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	
	<title>StationGuessr</title>
	
	<link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
	<style>
		* {
			padding: 0;
			margin: 0;
			box-sizing: border-box;
		}

		html {
			font-family: Helvetica;
		}

		:root {
			--base-color: white;
			--base-variant: #e8e9ed;
			--text-color: #111528;
			--secondary-text: #232738;
			--primary-color: #3a435d;
			--accent-color: #0071ff;
		}

		.darkmode {
			--base-color: #070b1d;
			--base-variant: #101425;
			--text-color: #ffffff;
			--secondary-text: #a4a5b8;
			--primary-color: #3a435d;
			--accent-color: #0071ff;
		}

		
		#themeswitch { 
			height: 50px;
			width: 50px; padding: 0;
			border-radius: 50%;
			background-color: var(--base-variant); 
			display: flex;
			justify-content: center;
			align-items: center;
			position: fixed;
			top: 10px;
			right: 10px;

		}

		#themeswitch svg {
			fill: var(--primary-color);
		}

		#themeswitch svg:last-child {
			display: none;
		}

		.darkmode #themeswitch svg:first-child {
			display: none;
		}

		.darkmode #themeswitch svg:last-child {
			display: block;
		}

		body {
			background-color: var(--base-color);
			color: var(--text-color);
			height: 100%;
			margin: 0;
		}
		.leaflet-container {
			height: 100vh;
			width: 100vw;
			max-width: 100%;
			max-height: 100%;
		}

		.topnav a {
			background-color: #008741;
			float: center;
			display: block;
			color: #ffffff;
			padding: 20px;
			text-align: center;
			text-decoration: none;
			font-size: 27px;
			font-weight: bold;
			letter-spacing: 1.5px;
		}

		#map {
			box-sizing: border-box;
			display: flex;
			justify-content: center;
            align-items: center;
			height: 40vh;
		}

		#guessing {
			box-sizing: border-box;
			display: flex;
			justify-content: center;
            align-items: center;
			height: 30vh;
			background-color: var(--base-variant);
			padding-bottom: 20px;
			padding-top: 55px;
		}

		.container {
			display: flex;
			flex-direction: column;
			height: 100vh;
		}
		.box {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			border-radius: 16px;
			border: 15px solid var(--base-color);
			
			padding: 20px;
			padding-top: 40px;
		}

		@media (min-width: 768px) {
            .container {
                flex-direction: row;
                align-items: center;
            }
			
			#map {
				height: 100vh;
				width: 50vw;
			}

			#guessing {
				height: 100vh;
				width: 50vw;
			}

			.allstations {
				width: 100%;
				height: 100%;
			}

			.wrapped {
				height: 95vh;
			}


        }

		.station {
			border-radius: 7px;
			border: 2px solid var(--secondary-text);
			background-color:var(--base-variant);
			border-style: solid;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-right: 10px;
			margin-block: 10px;
			padding: 5px;

		}

		.search {
			border-radius: 7px;
			border: 2px solid var(--secondary-text);
			background-color: var(--base-variant);
			color: var(--text-color);
			border-style: solid;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-right: 10px;
			padding: 15px;
			font-size: 15px;
		}

		.wrapped {
			width: 100%;
		}

		.allstations {
			width: 100%;
			overflow-x: clip;
			overflow-y: scroll;
			height: 35vh;
		}



	</style>
	<script type="text/javascript" src="darkmode.js" defer>

	</script>

	
</head>
